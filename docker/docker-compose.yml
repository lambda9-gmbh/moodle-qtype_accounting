version: '3.8'

services:
  moodle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moft-moodle
    ports:
      - "8080:80"
    environment:
      - MOODLE_DOCKER_DBTYPE=mariadb
      - MOODLE_DOCKER_DBHOST=mariadb
      - MOODLE_DOCKER_DBNAME=moodle
      - MOODLE_DOCKER_DBUSER=moodle
      - MOODLE_DOCKER_DBPASS=moodle_password
    volumes:
      - moodledata:/var/www/moodledata
      - behatdata:/var/www/behatdata
      - ../plugin:/var/www/html/question/type/buchungssatz
      - ./config.php:/var/www/html/config.php
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - moft-network

  mariadb:
    image: mariadb:10.11
    container_name: moft-mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=moodle
      - MYSQL_USER=moodle
      - MYSQL_PASSWORD=moodle_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - moft-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5
    container_name: moft-phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=mariadb
      - PMA_USER=root
      - PMA_PASSWORD=root_password
    depends_on:
      - mariadb
    networks:
      - moft-network

  selenium:
    image: selenium/standalone-firefox:latest
    container_name: moft-selenium
    ports:
      - "4444:4444"
      - "7900:7900"
    shm_size: '2gb'
    networks:
      - moft-network

volumes:
  moodledata:
  mariadb_data:
  behatdata:

networks:
  moft-network:
    driver: bridge
