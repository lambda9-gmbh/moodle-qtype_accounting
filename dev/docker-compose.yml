services:
  moodle:
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        - PHP_VERSION=${PHP_VERSION:-8.2}
        - MOODLE_VERSION=${MOODLE_VERSION:-MOODLE_405_STABLE}
    container_name: accounting-moodle
    ports:
      - "${MOODLE_PORT:-8080}:80"
    environment:
      - MOODLE_WWWROOT=${MOODLE_WWWROOT:-http://localhost:8080}
      - MOODLE_SSLPROXY=${MOODLE_SSLPROXY:-}
      - MOODLE_DOCKER_DBTYPE=mariadb
      - MOODLE_DOCKER_DBHOST=mariadb
      - MOODLE_DOCKER_DBNAME=${MYSQL_DATABASE:-moodle}
      - MOODLE_DOCKER_DBUSER=${MYSQL_USER:-moodle}
      - MOODLE_DOCKER_DBPASS=${MYSQL_PASSWORD:-moodle_password}
    volumes:
      - moodledata:/var/www/moodledata
      - behatdata:/var/www/behatdata
      # Mount plugin contents individually so dev/ doesn't leak into the container plugin dir.
      - ../version.php:/var/www/html/question/type/accounting/version.php
      - ../questiontype.php:/var/www/html/question/type/accounting/questiontype.php
      - ../question.php:/var/www/html/question/type/accounting/question.php
      - ../renderer.php:/var/www/html/question/type/accounting/renderer.php
      - ../edit_accounting_form.php:/var/www/html/question/type/accounting/edit_accounting_form.php
      - ../edit_chart.php:/var/www/html/question/type/accounting/edit_chart.php
      - ../manage_charts.php:/var/www/html/question/type/accounting/manage_charts.php
      - ../styles.css:/var/www/html/question/type/accounting/styles.css
      - ../README.md:/var/www/html/question/type/accounting/README.md
      - ../CHANGES.md:/var/www/html/question/type/accounting/CHANGES.md
      - ../ajax:/var/www/html/question/type/accounting/ajax
      - ../amd:/var/www/html/question/type/accounting/amd
      - ../backup:/var/www/html/question/type/accounting/backup
      - ../classes:/var/www/html/question/type/accounting/classes
      - ../db:/var/www/html/question/type/accounting/db
      - ../lang:/var/www/html/question/type/accounting/lang
      - ../pix:/var/www/html/question/type/accounting/pix
      - ../tests:/var/www/html/question/type/accounting/tests
      - ./docker/config.php:/var/www/html/config.php
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - accounting-network

  mariadb:
    image: mariadb:10.11
    container_name: accounting-mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-moodle}
      - MYSQL_USER=${MYSQL_USER:-moodle}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-moodle_password}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - accounting-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5
    container_name: accounting-phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      - PMA_HOST=mariadb
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
    depends_on:
      - mariadb
    networks:
      - accounting-network

  selenium:
    image: selenium/standalone-firefox:latest
    container_name: accounting-selenium
    ports:
      - "${SELENIUM_PORT:-4444}:4444"
      - "${SELENIUM_VNC_PORT:-7900}:7900"
    shm_size: '2gb'
    networks:
      - accounting-network

volumes:
  moodledata:
  mariadb_data:
  behatdata:

networks:
  accounting-network:
    driver: bridge